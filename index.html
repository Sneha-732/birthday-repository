<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Royal Buggu 👑❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    color:white;
    text-align:center;
    background:linear-gradient(-45deg,#ff0844,#ff5f6d,#ff758c,#ff0844);
    background-size:400% 400%;
    animation:bgMove 8s ease infinite;
}
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#introScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
font-family:'Pacifico',cursive;
font-size:8vw;
text-align:center;
transition:1s;
text-transform:capitalize;
letter-spacing:0.3vw;
}
.fadeOut{
opacity:0;
pointer-events:none;
transition:1s;
}
#introText{
  font-family:'Pacifico',cursive;
  font-size:10vw;
  text-shadow:0 0 2vw rgba(255,255,255,0.8);
  margin-bottom:2vh;
}
.scHeading{
    font-family:'Great Vibes', cursive;
    font-size:6vw;
    text-shadow:0 0 2vw rgba(255,255,255,0.8);
    margin-bottom:2vh;
}
.screen{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:5vw;
    opacity:0;
    pointer-events:none;
    transition:1s;
    z-index:2;
}
.active{
    opacity:1;
    pointer-events:auto;
}
button{
padding:1vw 5vw;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ffffff,#ffe6ea);
color:#ff0844;
font-size:4vw;
font-weight:600;
cursor:pointer;
margin-top:2vh;
box-shadow:0 2vw 4vw rgba(0,0,0,0.3);
transition:0.3s;
}
button:hover{
transform:scale(1.1);
box-shadow:0 3vw 5vw rgba(0,0,0,0.5);
}
.photo, .him{
    width:40vw;
    max-width:90%;
    height:auto;
    object-fit:cover;
    border-radius:2vw;
    box-shadow:0 2vw 5vw rgba(0,0,0,0.5);
    margin:1vw;
}
.photo-container{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:2vw;
    margin-bottom:2vh;
}
#message{
    min-height:3vh;
    margin-top:1vh;
    font-size:4vw;
}
.slideshow{
    width:80vw;
    max-width:95%;
    height:auto;
    aspect-ratio:4/3;
    overflow:hidden;
    border-radius:2vw;
    box-shadow:0 2vw 5vw rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:2vh;
    position:relative;
}
.slideshow img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:1s;
}
.slideshow img.activeSlide{
    opacity:1;
}
#celebrationScreen .photo{
    width:30vw;
    max-width:90%;
    height:auto;
    max-height:70vh;
    border-radius:2vw;
    box-shadow:0 2vw 5vw rgba(0,0,0,0.5);
}
canvas{
    position:absolute;
    top:0;
    left:0;
    pointer-events:none;
    z-index:1;
}
.floatingHeart{
position:absolute;
bottom:-2vh;
font-size:4vw;
animation:floatUp 6s linear infinite;
opacity:0.7;
}
@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}
@keyframes explode{
0%{transform:translate(-50%,-50%) scale(0.5);opacity:1;}
100%{transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.3);opacity:0;}
}
</style>
</head>
<body>
<canvas id="fireworks"></canvas>

<!-- INTRO SCREEN -->
<div id="introScreen">
<h1 id="introText"></h1>
</div>

<!-- SCREEN 1 -->
<div class="screen" id="screen1">
<h1 class="scHeading">A Little Surprise For You</h1>
<div id="countdown" style="font-size:5vw;margin-top:2vh;"></div>
<img id="birthdayImg" src="him2.jpg" class="photo" style="display:none;margin-top:2vh;">
<button id="openHeartBtn" onclick="openLove()">Open My Heart 💌</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
<h1 style="font-size:6vw;">My Royal Buggu 👑</h1>
<div class="photo-container">
<img src="him1.jpg" class="him">
<img src="him3.jpg" class="him">
<img src="him5.jpg" class="him">
<img src="him6.jpg" class="him">
<img src="him7.jpg" class="him">
<img src="him8.jpg" class="him">
<img src="him9.jpg" class="him">
<img src="him10.jpg" class="him">
</div>
<p id="typingText" style="font-size:4vw;max-width:90%;margin:auto;"></p>
<button onclick="showUs()">Our Memories 💞</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="screen3">
<h1 style="font-size:6vw;">Us ❤️</h1>
<div class="slideshow">
<img src="us1.jpg" class="activeSlide">
<img src="us2.jpg">
<img src="us3.jpg">
</div>
<p style="font-size:4vw;max-width:90%;margin:auto;margin-top:2vh;">Every memory with you is magic. I choose you today, tomorrow and always.</p>
<button onclick="finalQuestion()">One Last Question 💍</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="screen4">
<h1 style="font-size:6vw;">Will You Stay Mine Forever? 💖</h1>
<button onclick="celebrate()">YES ❤️</button>
<button onclick="noClicked(this)">NO 🙈</button>
<div id="message"></div>
</div>

<!-- SCREEN 5 -->
<div class="screen" id="celebrationScreen">
<h1 style="font-size:6vw;">Forever With You 👑❤️</h1>
<img src="us3.jpg" class="photo">
<h2 style="font-size:5vw;">Happy Birthday My King 🎉</h2>
</div>

<script>
// Intro Screen
let introMessages=["A Special Birthday Surprise 🎁","For Someone Very Important ❤️","MY World 🌍❤️","My Lifeline ❤️‍🩹","Meri Jaan ❤️🥰","Mera Buggu ❤️😘"];
let introIndex=0;
let introText=document.getElementById("introText");
function showIntro(){
    if(introIndex<introMessages.length){
        introText.innerHTML=introMessages[introIndex];
        introIndex++;
        setTimeout(showIntro,2000);
    } else {
        document.getElementById("introScreen").classList.add("fadeOut");
        setTimeout(()=>{document.getElementById("screen1").classList.add("active");},1000);
    }
}
showIntro();

// Typing text
let text="You are my happiness, my king, my forever. Today is your day.";
let i=0;
function typeText(){
if(i<text.length){
document.getElementById("typingText").innerHTML += text.charAt(i);
i++;
setTimeout(typeText,60);
}}
setTimeout(typeText,800);

// Floating Hearts
setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="floatingHeart";
heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(Math.random()*4+2)+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},500);

// Countdown
let target = new Date();
target.setHours(0,30,0);
let blastDone=false;
let countdownDiv = document.getElementById("countdown");
let birthdayImg = document.getElementById("birthdayImg");
function updateCountdown(){
    let now = new Date();
    let diff = target-now;
    if(diff<=0 && !blastDone){
        countdownDiv.innerHTML = "HAPPY BIRTHDAY MERA BUGGU MY BACHA 💖🎂🎁";
        countdownDiv.style.fontFamily = 'Poppins';
        birthdayImg.style.display="block";
        startFireworks(8000);
        blastDone=true;
        return;
    }
    if(!blastDone){
        let mins=Math.floor(diff/60000);
        let secs=Math.floor((diff%60000)/1000);
        countdownDiv.innerHTML = "Royal Surprise In: "+mins+"m "+secs+"s";
    }
}
setInterval(updateCountdown,1000);
updateCountdown();

// Fireworks
let canvas = document.getElementById("fireworks");
let ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
function startFireworks(duration=8000){
    let interval = setInterval(()=>{
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let i=0;i<120;i++){
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*4+2, 0, 2*Math.PI);
            ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
            ctx.fill();
        }
    },200);
    setTimeout(()=>{clearInterval(interval);ctx.clearRect(0,0,canvas.width,canvas.height);},duration);
}

// Navigation
function openLove(){
    document.getElementById("screen1").classList.remove("active");
    document.getElementById("screen2").classList.add("active");
}
function showUs(){
    document.getElementById("screen2").classList.remove("active");
    document.getElementById("screen3").classList.add("active");
    startSlideshow(); 
}

// Slideshow
let slideInterval;
function startSlideshow(){
    if(slideInterval) clearInterval(slideInterval);
    let slides = document.querySelectorAll("#screen3 .slideshow img");
    let slideIndex = 0;
    slides.forEach(s => s.classList.remove("activeSlide"));
    slides[0].classList.add("activeSlide");
    slideInterval = setInterval(()=>{
        slides.forEach(s => s.classList.remove("activeSlide"));
        slides[slideIndex].classList.add("activeSlide");
        slideIndex = (slideIndex + 1) % slides.length;
    },3000);
}

// YES/NO
let msgs=["⚠️ Error 404: NO not available 😌","🚫 Access Denied! Only YES works 👑","🙈 Oops! You misclicked!","😏 Nice try Buggu ❤️","💖 This love is permanent mode!","🔒 Locked! Destiny says YES"];
function noClicked(btn){
    let msgIndex = Math.floor(Math.random()*msgs.length);
    document.getElementById("message").innerHTML = msgs[msgIndex];
    btn.style.transform="translate("+(Math.random()*20-10)+"px,"+(Math.random()*20-10)+"px)";
    setTimeout(()=>{btn.style.transform="translate(0,0)";},150);
}
function finalQuestion(){
    document.getElementById("screen3").classList.remove("active");
    document.getElementById("screen4").classList.add("active");
}

// Celebrate YES
function celebrate(){
    document.getElementById("screen4").classList.remove("active");
    document.getElementById("celebrationScreen").classList.add("active");
    startFireworks(8000);

    for(let i=0;i<60;i++){
        let heart=document.createElement("div");
        heart.innerHTML="❤️";
        heart.style.position="absolute";
        heart.style.left="50%";
        heart.style.top="50%";
        heart.style.fontSize=(Math.random()*3+2)+"vw";
        heart.style.transform="translate(-50%,-50%)";
        heart.style.animation="explode 3s ease-out forwards";
        heart.style.zIndex="5";
        let angle=Math.random()*360*(Math.PI/180);
        let distance=Math.random()*25+20;
        heart.style.setProperty('--x',Math.cos(angle)*distance+'vw');
        heart.style.setProperty('--y',Math.sin(angle)*distance+'vw');
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),3000);
    }
}
</script>
</body>
</html>
