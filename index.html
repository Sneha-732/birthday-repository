<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Buggu ❤️</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body, html{width:100%;height:100%;overflow:hidden; font-family:'Poppins', sans-serif;}
.screen{width:100%;height:100%;position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:all 0.8s ease;opacity:0;pointer-events:none;}
.active{opacity:1;pointer-events:auto;}

/* Countdown */
#countdownScreen{background:black;color:white;font-size:3rem;display:flex;align-items:center;justify-content:center;flex-direction:column; font-family:'Dancing Script', cursive;}

/* Intro Screens */
.screen.intro{
  background:black;
  color:white;
  font-size:2.2rem;
  text-align:center;
  padding:20px;
  font-family:'Pacifico', cursive; /* decorative font */
}

/* Message Screen */
#messageScreen{
  background:linear-gradient(to bottom, #ffc0cb, #ffb6c1);
  color:#fff;
  text-align:center;
  padding:20px;
  font-family:'Dancing Script', cursive;
}
#messageScreen img{max-width:300px;border-radius:20px;margin:20px 0;}

/* Buttons */
.btn{
  padding:12px 25px;
  background:#ff3366;
  color:white;
  border:none;
  border-radius:30px;
  font-size:1rem;
  cursor:pointer;
  transition:0.3s;
  font-family:'Poppins', sans-serif;
}
#countdownScreen {
    background: black;
    color: white;
    font-size: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-family: 'Dancing Script', cursive;
    min-height: 100vh; /* ensures full screen height on mobile */
    text-align: center; /* optional, makes countdown centered */
    padding: 10px;
}
.btn:hover{background:#ff6699;}

/* Photo Screen */
#photoScreen{background:#ffe6f0;color:#333;text-align:center;padding:20px;overflow-y:auto;font-family:'Dancing Script', cursive;}
#photoScreen img{width:120px;height:120px;border-radius:15px;margin:10px;object-fit:cover;cursor:pointer;transition:0.3s;}
#photoScreen img:hover{transform:scale(1.1);}

/* Memories */
#memoriesScreen{background:#ffe6f0;color:#333;text-align:center;padding:20px;font-family:'Dancing Script', cursive;}
#slideshow{width:300px;height:300px;margin:20px auto;overflow:hidden;border-radius:20px;}
#slideshow img{width:100%;height:100%;object-fit:cover;display:none;}
#slideshow img.activeSlide{display:block;}

/* Proposal */
#proposalScreen{background:#ffb6c1;color:#fff;text-align:center;padding:20px;font-family:'Dancing Script', cursive;}
#proposalScreen button{margin:10px;}

/* Yes Screen */
#yesScreen{background:#ffc0cb;color:white;text-align:center;padding:20px;position:relative;overflow:hidden;font-family:'Dancing Script', cursive;}
#yesScreen img{width:250px;border-radius:20px;margin:20px 0;}

/* Hearts Animation */
.heart{position:absolute;width:20px;height:20px;background:red;transform:rotate(-45deg);animation:float 5s linear infinite;}
.heart:before,.heart:after{content:"";position:absolute;width:20px;height:20px;background:red;border-radius:50%;}
.heart:before{top:-10px;left:0;}
.heart:after{left:10px;top:0;}
@keyframes float{0%{transform:translateY(0) rotate(-45deg);opacity:1;}100%{transform:translateY(-600px) rotate(-45deg);opacity:0;}}

/* Responsive */
@media(max-width:768px){
    #countdownScreen{font-size:2rem;}
    #messageScreen img{max-width:200px;}
    #photoScreen img{width:80px;height:80px;}
    #slideshow{width:250px;height:250px;}
    #yesScreen img{width:180px;}
}
@media (max-width: 768px) {
    #countdownScreen {
        font-size: 2rem; /* smaller on mobile */
    }
}
</style>
</head>
<body>

<!-- Countdown Screen -->
<div class="screen active" id="countdownScreen">
    <div>Waiting for Surprise</div>
    <div id="countdown">01:00:00</div>
</div>

<!-- Intro Screens -->
<div class="screen intro" id="intro1" style="font-weight: bolder; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);     
    font-family: 'Pacifico', cursive; color: rgb(187, 107, 107)"> A little surprise for your Birthday 🎂</div>
<div style="font-weight: bolder; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);     
    font-family: 'Pacifico', cursive; color: rgb(187, 107, 107)" class="screen intro" id="intro2">Meri Jaan 💖</div>
<div class="screen intro" style="font-weight: bolder; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);     
    font-family: 'Pacifico', cursive; color: rgb(187, 107, 107)" id="intro3">My Lifeline🌟</div>
<div class="screen intro" style="font-weight: bolder; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);     
    font-family: 'Pacifico', cursive; color: rgb(187, 107, 107)"id="intro4">Mera Buggu 💞</div>

<!-- Message Screen -->
<div class="screen" id="messageScreen" style="font-weight: bolder;  
    font-family: 'Pacifico', cursive; color: rgb(187, 107, 107)">
    <div>A little surprise for you 💖<br>Happy birthday bcha 💞</div>
    <img src="him2.jpg" alt="Photo">
    <button class="btn" id="openHeartBtn">Open My Heart 💖 </button>
</div>

<!-- Photo Screen -->
<div class="screen" id="photoScreen">
    <h2>Happy Birthday Buggu</h2>
    <div id="photoContainer">
        <img src="him1.jpg" alt="">
        <img src="him2.jpg" alt="">
        <img src="him3.jpg" alt="">
        <img src="him4.jpg" alt="">
        <img src="him5.jpg" alt="">
        <img src="him6.jpg" alt="">
        <img src="him7.jpg" alt="">
        <img src="him8.jpg" alt="">
        <img src="him9.jpg" alt="">
        <img src="him10.jpg" alt="">
        <img src="him11.jpg" alt="">
    </div>
    <button class="btn" id="toMemories">Us Forever💞</button>
</div>

<!-- Memories Screen -->
<div class="screen" id="memoriesScreen">
    <h2>Us Memories💖💖</h2>
    <div id="slideshow">
        <img src="us1.jpg" class="activeSlide">
        <img src="us2.jpg">
        <img src="us3.jpg">
    </div>
    <button class="btn" id="lastQuestion">Last Question</button>
</div>

<!-- Proposal Screen -->
<!-- Proposal Screen -->
<!-- Proposal Screen -->
<div class="screen" id="proposalScreen">
    <h2>Will you stay mine forever?</h2>
    <button class="btn" id="yesBtn">Yes</button>
    <button class="btn" id="noBtn">No</button>

    <!-- No message display -->
    <div id="noMessage" style="display:none; margin-top:20px; padding:15px; 
        background:#ff99aa; color:white; border-radius:20px; font-weight:bold; 
        font-size:1.5rem; text-align:center; animation:fadeIn 0.8s;">
        😢 Oops! Don’t be sad! You’re my everything! 💖
    </div>
</div>

<!-- Yes Screen -->
<div class="screen" id="yesScreen">
    <h2>Yay! ❤️</h2>
    <img src="us3.jpg" alt="Us">
    <div style="font-weight: bolder; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);     
    font-family: 'Pacifico', cursive; color: rgb(187, 107, 107)">Forever yours 💖</div>
</div>

<script>
    const noMessagesArray = [
    "😢 Oops! Don’t be sad! You’re my everything! 💖",
    "🥺 Please say yes! You’re my lifeline 🌟",
    "💔 Aww, I can’t live without you!",
    "😔 Don’t worry, I still love you tons 💞",
    "😢 Hey! Don’t make me sad, my Buggu 💖"
];
const countdownScreen = document.getElementById('countdownScreen');
const messageScreen = document.getElementById('messageScreen');
const photoScreen = document.getElementById('photoScreen');
const memoriesScreen = document.getElementById('memoriesScreen');
const proposalScreen = document.getElementById('proposalScreen');
const yesScreen = document.getElementById('yesScreen');

// Intro messages screens
const introScreens = [
    document.getElementById('intro1'),
    document.getElementById('intro2'),
    document.getElementById('intro3'),
    document.getElementById('intro4')
];

// Countdown
let now = new Date();
let countDownTime = new Date();
countDownTime.setHours(13, 11, 0, 0); // 13 = 1:05 PM
if(now > countDownTime) countDownTime.setDate(countDownTime.getDate()+1);
const countdownElem = document.getElementById('countdown');

function updateCountdown(){
    let now = new Date().getTime();
    let distance = countDownTime - now;
    let hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    let minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    let seconds = Math.floor((distance % (1000*60))/1000);
    countdownElem.innerHTML = (hours<10?'0'+hours:hours)+":"+(minutes<10?'0'+minutes:minutes)+":"+(seconds<10?'0'+seconds:seconds);
    if(distance <=0){
        clearInterval(countdownInterval);
        startIntroSequence();
    }
}
let countdownInterval = setInterval(updateCountdown,1000);
updateCountdown();
// Instead of alert, show message on screen
const noBtn = document.getElementById('noBtn');
const noMessage = document.getElementById('noMessage');

noBtn.addEventListener('click', () => {
    // Pick a random message
    const randomIndex = Math.floor(Math.random() * noMessagesArray.length);
    noMessage.innerHTML = noMessagesArray[randomIndex];
    
    // Show the message
    noMessage.style.display = 'block';

    // Optional: hide after 3 seconds
    setTimeout(() => {
        noMessage.style.display = 'none';
    }, 3000);
});
// Show intro screens one by one
function startIntroSequence(){
    countdownScreen.classList.remove('active');
    let i = 0;
    function showNext(){
        if(i>0) introScreens[i-1].classList.remove('active');
        if(i<introScreens.length){
            introScreens[i].classList.add('active');
            i++;
            setTimeout(showNext, 1500);
        } else {
            messageScreen.classList.add('active');
        }
    }
    showNext();
}

// Floating hearts
function createHeart(){
    let heart=document.createElement('div');
    heart.classList.add('heart');
    heart.style.left=Math.random()*window.innerWidth+'px';
    heart.style.background='pink';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
}
setInterval(createHeart,500);

// Buttons
document.getElementById('openHeartBtn').addEventListener('click',()=>{messageScreen.classList.remove('active');photoScreen.classList.add('active');});
document.getElementById('toMemories').addEventListener('click',()=>{photoScreen.classList.remove('active');memoriesScreen.classList.add('active');});
const slides=document.querySelectorAll('#slideshow img');
let currentSlide=0;
setInterval(()=>{slides[currentSlide].classList.remove('activeSlide');currentSlide=(currentSlide+1)%slides.length;slides[currentSlide].classList.add('activeSlide');},3000);
document.getElementById('lastQuestion').addEventListener('click',()=>{memoriesScreen.classList.remove('active');proposalScreen.classList.add('active');});

document.getElementById('yesBtn').addEventListener('click',()=>{proposalScreen.classList.remove('active');yesScreen.classList.add('active');});
</script>
</body>
</html>
